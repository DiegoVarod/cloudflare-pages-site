<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sitio Cloudflare</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f4f4f4;
            padding: 20px;
            font-size: 13px;
        }
        h1 { font-size: 18px; margin-bottom: 14px; color: #222; }
        h2 { font-size: 15px; margin-top: 20px; margin-bottom: 10px; color: #222; font-family: sans-serif; }
        pre { background: #fff; border: 1px solid #ccc; padding: 15px; white-space: pre-wrap; word-break: break-word; }
        .top-actions a { margin-right: 12px; }
    </style>
</head>
<body>

<h1>Sitio Cloudflare</h1>

<h2>🔵 Request Headers</h2>
<pre id="output">
Cargando...
</pre>

<script>
async function load() {
    const res = await fetch('/request');
    const data = await res.json();

    let text = "";

    text += "Request URL: " + data.requestUrl + "\n\n";
    text += data.requestLine + "\n\n";

    for (const [k, v] of Object.entries(data.headers)) {
        text += k + ": " + v + "\n";
    }

    document.getElementById("output").textContent = text;
}

load();
</script>

</body>
</html>
